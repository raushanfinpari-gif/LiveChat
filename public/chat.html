<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LiveChat</title>
  <style>
    :root {
      --bg: #0f1117;
      --panel: #161b22;
      --border: #30363d;
      --text: #c9d1d9;
      --muted: #8b949e;
      --accent: #58a6ff;
      --accent2: #238636;
      --danger: #f85149;
      --success: #3fb950;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 900px;
      margin: 0 auto;
    }
    header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    header h1 {
      font-size: 18px;
      margin: 0;
      color: var(--accent);
    }
    .status {
      font-size: 12px;
      padding: 3px 10px;
      border-radius: 12px;
      background: var(--border);
      color: var(--muted);
      margin-left: auto;
    }
    .status.ok { background: rgba(63,185,80,.15); color: var(--success); }
    .status.err { background: rgba(248,81,73,.15); color: var(--danger); }

    .setup {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      background: var(--panel);
      display: grid;
      grid-template-columns: 1fr 1fr 1fr auto;
      gap: 10px;
      align-items: end;
    }
    .setup label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: .5px;
      display: block;
      margin-bottom: 4px;
    }
    .setup input[type="text"], .setup input[type="password"] {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .setup input:focus { outline: none; border-color: var(--accent); }
    .setup .remember {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .setup button {
      padding: 8px 16px;
      border: none;
      border-radius: 6px;
      background: var(--accent2);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
    .setup button:hover { opacity: .9; }

    .toolbar {
      padding: 8px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    .toolbar label { font-size: 12px; color: var(--muted); }
    .toolbar input {
      padding: 6px 10px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .toolbar button {
      padding: 6px 14px;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
    }
    .toolbar button:hover { border-color: var(--accent); }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .empty {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }
    .msg {
      display: flex;
      flex-direction: column;
      gap: 2px;
      padding: 10px 12px;
      border-radius: 10px;
      background: var(--panel);
      border: 1px solid var(--border);
      animation: pop .15s ease;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .msg-sender {
      font-weight: 700;
      font-size: 13px;
      color: var(--accent);
    }
    .msg-task {
      font-size: 11px;
      color: var(--muted);
      background: rgba(88,166,255,.1);
      padding: 1px 8px;
      border-radius: 10px;
    }
    .msg-time {
      font-size: 11px;
      color: var(--muted);
      margin-left: auto;
    }
    .msg-text {
      font-size: 14px;
      line-height: 1.45;
      word-break: break-word;
      white-space: pre-wrap;
    }
    .msg-id {
      font-size: 10px;
      color: var(--muted);
      opacity: .6;
    }

    .compose {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      background: var(--panel);
      display: flex;
      gap: 10px;
      align-items: center;
    }
    .compose input[type="text"] {
      flex: 1;
      padding: 10px 12px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
    }
    .compose input:focus { outline: none; border-color: var(--accent); }
    .compose button {
      padding: 10px 18px;
      border: none;
      border-radius: 8px;
      background: var(--accent2);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
      white-space: nowrap;
    }
    .compose button:hover { opacity: .9; }
    .compose button:disabled { opacity: .5; cursor: not-allowed; }

    @media (max-width: 640px) {
      .setup { grid-template-columns: 1fr 1fr; }
      .compose { flex-wrap: wrap; }
      .compose input[type="text"] { width: 100%; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>LiveChat</h1>
      <span class="status" id="connStatus">Disconnected</span>
    </header>

    <div class="setup">
      <div>
        <label>Room</label>
        <input type="text" id="roomInput" value="" placeholder="blank = default room">
      </div>
      <div>
        <label>Default task (when sending)</label>
        <input type="text" id="taskInput" value="bbmacsync" placeholder="task name">
      </div>
      <div>
        <label>Sender</label>
        <input type="text" id="senderInput" value="user" placeholder="your name">
      </div>
      <div>
        <label>Token</label>
        <input type="password" id="tokenInput" placeholder="AGENT_CHAT_TOKEN">
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <label class="remember">
          <input type="checkbox" id="rememberCheck"> Remember
        </label>
        <button id="connectBtn">Connect</button>
      </div>
    </div>

    <div class="toolbar">
      <label>Filter task:</label>
      <input type="text" id="filterTask" value="" placeholder="blank = show all tasks">
      <button id="refreshBtn">Refresh</button>
      <label style="margin-left:auto;font-size:12px;color:var(--muted);">
        Admin view · Auto-refresh: 5s
      </label>
    </div>

    <div id="messages">
      <div class="empty">Enter your token and click Connect.</div>
    </div>

    <div class="compose">
      <input type="text" id="msgInput" placeholder="Type a message..." maxlength="4000">
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="/agent-chat/chat.js"></script>
</body>
</html>
